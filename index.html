<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASC 10초 맞추기 게임</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');

        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f0f0f0; font-family: 'Noto Sans KR', sans-serif; }
        #game-container { position: relative; width: 400px; height: 600px; background: white; overflow: hidden; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }

        .screen { position: absolute; width: 100%; height: 100%; display: none; }
        .screen.active { display: block; }

        /* 이미지 대용 배경 설정 (이미지가 있으면 url('파일명')으로 교체) */
        .bg-layer { position: absolute; width: 100%; height: 100%; background-size: cover; background-position: center; z-index: 1; display: flex; justify-content: center; align-items: center; color: rgba(0,0,0,0.1); font-weight: bold; }
        #screen-start .bg-layer { background-color: #ffeaa7; } /* 시작화면 이미지 자리 */
        #screen-info .bg-layer { background-color: #fab1a0; }  /* 정보입력 이미지 자리 */
        #screen-game .bg-layer { background-color: #81ecec; }  /* 게임화면 이미지 자리 */

        /* 버튼 및 입력창 스타일 */
        .overlay-btn { position: absolute; z-index: 10; background: rgba(0,0,0,0.1); border: 2px solid white; cursor: pointer; color: white; border-radius: 8px; font-weight: bold; }
        .overlay-btn:hover { background: rgba(0,0,0,0.3); }

        .info-input { position: absolute; z-index: 10; width: 60%; height: 35px; border: 1px solid #ddd; border-radius: 5px; padding: 0 10px; left: 20%; font-size: 14px; }
        
        .next-btn { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); width: 150px; height: 45px; z-index: 10; border-radius: 25px; border: none; font-weight: bold; font-size: 18px; color: white; background-color: #ccc; cursor: not-allowed; transition: 0.3s; }
        .next-btn.active { background-color: #3498db; cursor: pointer; }

        #timer-display { position: absolute; top: 150px; left: 50%; transform: translateX(-50%); z-index: 10; font-size: 70px; font-weight: bold; color: #2d3436; font-family: monospace; }
        
        .confirm-btn { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 20; padding: 12px 30px; background: #2ecc71; color: white; border: none; border-radius: 30px; cursor: pointer; font-size: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .hidden { display: none !important; }

        /* 랭킹 화면 */
        #screen-ranking { background-color: #f8f9fa; z-index: 30; overflow-y: auto; padding: 20px; box-sizing: border-box; text-align: center; }
        .top3-container { display: flex; justify-content: center; align-items: flex-end; gap: 8px; margin-top: 20px; height: 180px; }
        .rank-card { width: 100px; background: white; border-radius: 12px; padding: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; justify-content: center; }
        .rank-card.gold { height: 100%; border: 3px solid #f1c40f; }
        .rank-card.silver { height: 85%; border: 3px solid #bdc3c7; }
        .rank-card.bronze { height: 75%; border: 3px solid #e67e22; }
        
        .rank-list-others { margin-top: 20px; }
        .rank-item { display: flex; justify-content: space-between; align-items: center; background: white; margin-top: 8px; padding: 12px 15px; border-radius: 12px; font-size: 13px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        .arrow-up { color: #2ecc71; margin-left: 5px; }
        .arrow-down { color: #e74c3c; margin-left: 5px; }
        
        .home-btn { margin-top: 25px; padding: 10px 40px; background: #34495e; color: white; border: none; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- 1. 시작 화면 -->
        <section id="screen-start" class="screen active">
            <div class="bg-layer">시작 화면 이미지 위치</div>
            <button id="btn-to-input" class="overlay-btn" style="top: 300px; left: 100px; width: 200px; height: 50px;">시작하기</button>
            <button id="btn-to-ranking" class="overlay-btn" style="top: 370px; left: 100px; width: 200px; height: 50px;">랭킹보기</button>
        </section>

        <!-- 2. 정보 입력 화면 -->
        <section id="screen-info" class="screen">
            <div class="bg-layer">정보 입력 이미지 위치</div>
            <input type="text" id="input-name" class="info-input" style="top: 180px;" placeholder="이름을 입력하세요">
            <input type="text" id="input-id" class="info-input" style="top: 240px;" placeholder="학번을 입력하세요">
            <input type="text" id="input-dept" class="info-input" style="top: 300px;" placeholder="학과를 입력하세요">
            <button id="btn-next" class="next-btn" disabled>다음</button>
        </section>

        <!-- 3. 게임 화면 -->
        <section id="screen-game" class="screen">
            <div class="bg-layer">게임 화면 이미지 위치</div>
            <div id="timer-display">00:00</div>
            <button id="btn-start" class="overlay-btn" style="top: 320px; left: 50px; width: 140px; height: 60px; background: #2ecc71;">START</button>
            <button id="btn-stop" class="overlay-btn" style="top: 320px; right: 50px; width: 140px; height: 60px; background: #e74c3c;">STOP</button>
            <button id="btn-game-confirm" class="confirm-btn hidden">결과 확인 & 랭킹가기</button>
        </section>

        <!-- 4. 랭킹 화면 -->
        <section id="screen-ranking" class="screen">
            <h2 style="font-size: 20px; margin-bottom: 0;">실시간 리더보드</h2>
            <p style="font-size: 11px; color: #777;">10.00초에 가장 가까운 순서입니다.</p>
            
            <div class="top3-container" id="top3-list">
                <!-- JS에서 생성 -->
            </div>

            <div class="rank-list-others" id="rank-list-others">
                <!-- JS에서 생성 -->
            </div>
            
            <button id="btn-rank-home" class="home-btn">처음으로 돌아가기</button>
        </section>
    </div>

    <script>
        let startTime, timerInterval;
        let userData = { name: '', id: '', dept: '' };
        let db = JSON.parse(localStorage.getItem('penguinDB')) || [];
        let prevRankings = new Map(); // 이전 순위 저장용

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // 입력 제어
        const inputs = document.querySelectorAll('.info-input');
        const nextBtn = document.getElementById('btn-next');

        inputs.forEach(input => {
            input.addEventListener('input', () => {
                const allFilled = Array.from(inputs).every(i => i.value.trim() !== "");
                nextBtn.disabled = !allFilled;
                nextBtn.classList.toggle('active', allFilled);
            });
        });

        document.getElementById('btn-to-input').onclick = () => showScreen('screen-info');
        document.getElementById('btn-to-ranking').onclick = () => { updateRankingUI(); showScreen('screen-ranking'); };

        nextBtn.onclick = () => {
            userData.name = document.getElementById('input-name').value;
            userData.id = document.getElementById('input-id').value;
            userData.dept = document.getElementById('input-dept').value;
            showScreen('screen-game');
        };

        // 게임 로직
        const timerDisplay = document.getElementById('timer-display');
        const gameConfirmBtn = document.getElementById('btn-game-confirm');

        document.getElementById('btn-start').onclick = () => {
            if (timerInterval) return;
            startTime = Date.now();
            gameConfirmBtn.classList.add('hidden');
            timerInterval = setInterval(() => {
                const elapsed = (Date.now() - startTime) / 1000;
                timerDisplay.innerText = elapsed.toFixed(2).replace('.', ':');
            }, 10);
        };

        document.getElementById('btn-stop').onclick = () => {
            if (!timerInterval) return;
            clearInterval(timerInterval);
            timerInterval = null;
            const finalScore = parseFloat(timerDisplay.innerText.replace(':', '.'));
            saveToDB(finalScore);
            gameConfirmBtn.classList.remove('hidden');
        };

        gameConfirmBtn.onclick = () => {
            updateRankingUI();
            showScreen('screen-ranking');
        };

        function saveToDB(score) {
            // 현재 순위들을 백업 (순위 변동 계산용)
            db.forEach((item, index) => prevRankings.set(item.id, index + 1));
            
            const diff = Math.abs(10 - score);
            const newEntry = { ...userData, score: score, diff: diff };
            
            db.push(newEntry);
            db.sort((a, b) => a.diff - b.diff); // 10초 오차가 작은 순 정렬
            localStorage.setItem('penguinDB', JSON.stringify(db));
        }

        function updateRankingUI() {
            const top3List = document.getElementById('top3-list');
            const otherList = document.getElementById('rank-list-others');
            top3List.innerHTML = '';
            otherList.innerHTML = '';

            db.forEach((item, index) => {
                const rank = index + 1;
                const prevRank = prevRankings.get(item.id);
                let arrow = '';
                
                if (prevRank) {
                    if (rank < prevRank) arrow = '<span class="arrow-up">▲</span>';
                    else if (rank > prevRank) arrow = '<span class="arrow-down">▼</span>';
                }

                if (rank <= 3) {
                    const medals = ['🥇 1st', '🥈 2nd', '🥉 3rd'];
                    const types = ['gold', 'silver', 'bronze'];
                    const card = document.createElement('div');
                    card.className = `rank-card ${types[index]}`;
                    card.innerHTML = `
                        <div style="font-size:12px; font-weight:bold;">${medals[index]} ${arrow}</div>
                        <div style="font-size:14px; margin:5px 0;">${item.name}</div>
                        <div style="font-size:10px; color:#666;">${item.dept}</div>
                        <div style="font-size:15px; font-weight:bold; color:#2c3e50;">${item.score.toFixed(2)}s</div>
                    `;
                    top3List.appendChild(card);
                } else {
                    const row = document.createElement('div');
                    row.className = 'rank-item';
                    row.innerHTML = `
                        <div style="width:40px;"><b>${rank}</b>${arrow}</div>
                        <div style="flex:1; text-align:left; padding-left:10px;">
                            <b>${item.name}</b> <span style="font-size:11px; color:#888;">${item.id}</span>
                        </div>
                        <div style="width:80px; font-size:11px;">${item.dept}</div>
                        <div style="width:50px; font-weight:bold;">${item.score.toFixed(2)}</div>
                    `;
                    otherList.appendChild(row);
                }
            });
        }

        document.getElementById('btn-rank-home').onclick = () => {
            inputs.forEach(i => i.value = '');
            nextBtn.disabled = true;
            nextBtn.classList.remove('active');
            timerDisplay.innerText = "00:00";
            gameConfirmBtn.classList.add('hidden');
            showScreen('screen-start');
        };
    </script>
</body>
</html>
